<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bilingua Quest — Fredericton</title>
<style>
  :root {
    --ui-navy: #1a2340;
    --ui-navy2: #232f57;
    --ui-gold: #e8c04a;
    --ui-cream: #f4ead2;
    --ui-blue: #6fa3e8;
    --ui-red: #c94f4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0b0e1a; overflow: hidden; touch-action: none; }
  body { font-family: 'Courier New', Courier, monospace; color: var(--ui-cream); }

  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0b0e1a;
  }

  /* ---------- SNES window chrome ---------- */
  .win {
    background: linear-gradient(180deg, var(--ui-navy2), var(--ui-navy));
    border: 3px solid var(--ui-cream);
    border-radius: 8px;
    box-shadow: 0 0 0 3px var(--ui-navy), 0 6px 0 3px rgba(0,0,0,0.4);
    color: var(--ui-cream);
    padding: 14px 16px;
    line-height: 1.45;
  }
  .hidden { display: none !important; }

  #dlg {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: max(12px, env(safe-area-inset-bottom));
    width: min(640px, calc(100vw - 20px));
    min-height: 108px;
    z-index: 30;
    font-size: 15px;
  }
  #dlg .speaker {
    display: inline-block;
    background: var(--ui-navy);
    border: 2px solid var(--ui-cream);
    border-radius: 6px;
    padding: 1px 10px;
    margin-top: -26px;
    margin-bottom: 6px;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 0.06em;
  }
  #dlg .speaker .star { color: var(--ui-gold); }
  #dlg-text { min-height: 44px; white-space: pre-wrap; }
  #dlg-text .fr { display: block; }
  #dlg-text .en { display: block; font-size: 12px; opacity: 0.75; font-style: italic; margin-top: 4px; }
  #dlg .next { position: absolute; right: 14px; bottom: 8px; animation: bob 0.8s infinite; color: var(--ui-gold); }
  @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(3px);} }
  @media (prefers-reduced-motion: reduce) { #dlg .next { animation: none; } }

  #choices { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .choice {
    text-align: left;
    font-family: inherit;
    font-size: 14px;
    background: var(--ui-navy);
    color: var(--ui-cream);
    border: 2px solid var(--ui-cream);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
  }
  .choice:hover, .choice:focus-visible { background: var(--ui-navy2); border-color: var(--ui-gold); outline: none; }
  .choice .en { display: block; font-size: 11px; opacity: 0.7; font-style: italic; }
  .choice .cursor { color: var(--ui-gold); margin-right: 6px; }

  /* ---------- modal ---------- */
  .modal {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(5, 8, 18, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .modal .win { width: min(560px, 100%); max-height: 86vh; overflow-y: auto; }
  .modal h2 { font-size: 17px; color: var(--ui-gold); margin-bottom: 10px; letter-spacing: 0.04em; }
  .modal h3 { font-size: 14px; color: var(--ui-blue); margin: 12px 0 4px; }
  .modal p, .modal li { font-size: 13px; }
  .modal ul { padding-left: 18px; }
  .btnrow { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    font-family: inherit; font-size: 14px; font-weight: bold;
    background: var(--ui-gold); color: #201a08;
    border: 2px solid var(--ui-cream); border-radius: 6px;
    padding: 8px 18px; cursor: pointer;
  }
  .btn.alt { background: var(--ui-navy); color: var(--ui-cream); font-weight: normal; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn:focus-visible { outline: 3px solid var(--ui-blue); }
  input[type="text"] {
    font-family: inherit; font-size: 15px;
    background: #101730; color: var(--ui-cream);
    border: 2px solid var(--ui-cream); border-radius: 6px;
    padding: 8px 10px; width: 100%;
  }
  label.check { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; margin: 10px 0; cursor: pointer; }
  input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--ui-gold); flex: none; margin-top: 1px; }

  /* passport stamps */
  .stamps { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; margin: 8px 0; }
  .stamp {
    border: 2px dashed rgba(244, 234, 210, 0.35); border-radius: 8px;
    padding: 8px 6px; text-align: center; font-size: 11px; min-height: 58px;
    display: flex; flex-direction: column; justify-content: center; gap: 3px;
  }
  .stamp.got { border: 2px solid var(--ui-gold); background: rgba(232, 192, 74, 0.12); }
  .stamp .ico { font-size: 17px; }
  .meter { height: 12px; border: 2px solid var(--ui-cream); border-radius: 999px; overflow: hidden; background: #101730; }
  .meter > div { height: 100%; background: linear-gradient(90deg, var(--ui-blue), var(--ui-gold)); transition: width 0.4s; }
  .evt { border: 2px solid rgba(244,234,210,0.3); border-radius: 8px; padding: 8px 10px; margin: 8px 0; }
  .evt .when { color: var(--ui-gold); font-size: 11px; letter-spacing: 0.05em; }
  .evt .fr { font-size: 12px; opacity: 0.8; font-style: italic; }
  .tag { display: inline-block; font-size: 10px; border: 1px solid var(--ui-blue); color: var(--ui-blue); border-radius: 999px; padding: 0 8px; margin-left: 6px; vertical-align: middle; }

  /* HUD */
  #hud {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 8px; align-items: center;
    font-size: 12px; pointer-events: none;
  }
  #hud .pill {
    background: rgba(26, 35, 64, 0.88); border: 2px solid var(--ui-cream);
    border-radius: 999px; padding: 3px 12px; pointer-events: auto;
  }
  #hud button.pill { cursor: pointer; color: var(--ui-cream); font-family: inherit; font-size: 12px; }
  #loc-banner {
    position: fixed; top: 44px; left: 50%; transform: translateX(-50%);
    z-index: 19; font-size: 13px; letter-spacing: 0.08em; color: var(--ui-cream);
    background: rgba(26,35,64,0.85); border: 2px solid var(--ui-gold); border-radius: 6px;
    padding: 3px 14px; opacity: 0; transition: opacity 0.5s; pointer-events: none;
  }

  /* touch controls */
  #touch { position: fixed; inset: 0; z-index: 25; pointer-events: none; display: none; }
  body.touch #touch { display: block; }
  #dpad {
    position: absolute; left: 14px; bottom: max(120px, calc(env(safe-area-inset-bottom) + 120px));
    width: 132px; height: 132px; pointer-events: auto;
  }
  #dpad button {
    position: absolute; width: 44px; height: 44px;
    background: rgba(26,35,64,0.85); border: 2px solid var(--ui-cream); border-radius: 8px;
    color: var(--ui-cream); font-size: 16px; font-family: inherit;
  }
  #dpad .up { left: 44px; top: 0; } #dpad .down { left: 44px; bottom: 0; }
  #dpad .left { left: 0; top: 44px; } #dpad .right { right: 0; top: 44px; }
  #abtn {
    position: absolute; right: 18px; bottom: max(130px, calc(env(safe-area-inset-bottom) + 130px));
    width: 62px; height: 62px; border-radius: 50%;
    background: rgba(232,192,74,0.92); border: 3px solid var(--ui-cream);
    color: #201a08; font-size: 20px; font-weight: bold; font-family: inherit;
    pointer-events: auto;
  }
</style>
</head>
<body>
<div id="stage"><canvas id="game" width="480" height="320" aria-label="Bilingua Quest game world"></canvas></div>

<a id="vision-link" href="../" style="position:fixed; right:14px; top:12px; z-index:22; font-size:12px; color:var(--ui-gold); background:rgba(26,35,64,0.88); border:2px solid var(--ui-cream); border-radius:999px; padding:3px 12px; text-decoration:none; font-family:inherit;">La vision →</a>

<div id="hud" class="hidden">
  <span class="pill" id="hud-conf">☕ 0</span>
  <button class="pill" id="hud-passport" type="button">Passeport [P]</button>
  <button class="pill" id="hud-lang" type="button">FR/EN</button>
  <button class="pill" id="hud-snd" type="button">♪ off</button>
</div>
<div id="loc-banner"></div>

<div id="dlg" class="win hidden" role="dialog" aria-live="polite">
  <span class="speaker" id="dlg-speaker"></span>
  <div id="dlg-text"></div>
  <div id="choices"></div>
  <span class="next" id="dlg-next">▼</span>
</div>

<div id="modal-root"></div>

<div id="touch">
  <div id="dpad">
    <button class="up" data-dir="up" type="button" aria-label="Up">▲</button>
    <button class="down" data-dir="down" type="button" aria-label="Down">▼</button>
    <button class="left" data-dir="left" type="button" aria-label="Left">◀</button>
    <button class="right" data-dir="right" type="button" aria-label="Right">▶</button>
  </div>
  <button id="abtn" type="button" aria-label="Interact">A</button>
</div>

<script>
'use strict';
/* =====================================================================
   BILINGUA QUEST — Fredericton  (v0 prototype)
   A cozy SNES-style walk around real downtown Fredericton + the northside,
   where every conversation in French succeeds charmingly.
   Single file, no dependencies. Map geometry from TomTom (see game/data/).
   ===================================================================== */

/* ---------------- i18n (UI chrome) ---------------- */
let LANG = localStorage.getItem('bq_lang') || 'en';
const T = {
  title:      { en: 'BILINGUA QUEST', fr: 'BILINGUA QUEST' },
  subtitle:   { en: 'Fredericton', fr: 'Fredericton' },
  pressStart: { en: 'PRESS ENTER / TAP', fr: 'APPUYEZ SUR ENTRÉE / TOUCHEZ' },
  newGame:    { en: 'New game', fr: 'Nouvelle partie' },
  continueG:  { en: 'Continue', fr: 'Continuer' },
  gateTitle:  { en: 'Before you play', fr: 'Avant de jouer' },
  gateBody:   { en: 'Bilingua Quest is for adults (18+). Real venues appear in the game; real-world meetups follow the safety rules in your Passeport: public places only, tell a friend, trust your instincts.', fr: 'Bilingua Quest est réservé aux adultes (18+). De vrais commerces apparaissent dans le jeu; les rencontres réelles suivent les règles de sécurité de votre Passeport : lieux publics seulement, avertissez un ami, fiez-vous à votre instinct.' },
  gateCheck:  { en: 'I am 18 or older', fr: 'J’ai 18 ans ou plus' },
  gateName:   { en: 'Your name, traveller?', fr: 'Votre nom, voyageur·euse ?' },
  gateGo:     { en: 'Enter Fredericton', fr: 'Entrer à Fredericton' },
  createT:    { en: 'Choose your traveller', fr: 'Choisissez votre voyageur·euse' },
  confQ:      { en: 'How is your French right now? (Honest answers earn bonus charm.)', fr: 'Comment va votre français en ce moment ? (L’honnêteté a du charme.)' },
  conf1:      { en: 'Twelve years of school French… buried somewhere', fr: 'Douze ans de français scolaire… enfoui quelque part' },
  conf2:      { en: 'I can order a coffee if nobody watches', fr: 'Je peux commander un café si personne ne regarde' },
  conf3:      { en: 'Pretty good — I want real conversations', fr: 'Assez bon — je veux de vraies conversations' },
  begin:      { en: 'Begin', fr: 'Commencer' },
  passport:   { en: 'PASSEPORT', fr: 'PASSEPORT' },
  confidence: { en: 'Confidence', fr: 'Confiance' },
  stamps:     { en: 'Venue stamps', fr: 'Timbres des lieux' },
  events:     { en: 'Rendez-vous board', fr: 'Babillard des rendez-vous' },
  safety:     { en: 'Safety card', fr: 'Carte de sécurité' },
  safetyRules:{ en: ['Meet in public places — cafés, pubs, the market.', 'Tell a friend where you’re going.', 'Trust your instincts. Leaving early is always fine.', 'Look for the gold star: Hôtes host French practice.'], fr: ['Rencontrez-vous dans des lieux publics — cafés, pubs, marché.', 'Dites à un ami où vous allez.', 'Fiez-vous à votre instinct. Partir tôt, c’est toujours correct.', 'Cherchez l’étoile dorée : les Hôtes animent la pratique du français.'] },
  close:      { en: 'Close', fr: 'Fermer' },
  sample:     { en: 'Sample data — real listings arrive with v1', fr: 'Données d’exemple — les vraies annonces arrivent avec la v1' },
  talk:       { en: 'talk', fr: 'parler' },
  enter:      { en: 'enter', fr: 'entrer' },
  read:       { en: 'read', fr: 'lire' },
  exit:       { en: 'exit', fr: 'sortir' },
  stampGot:   { en: 'STAMP EARNED!', fr: 'TIMBRE OBTENU !' },
  confUp:     { en: 'Confidence +', fr: 'Confiance +' },
  demoNote:   { en: 'v0 prototype — demo sign-in, saves on this device only', fr: 'Prototype v0 — connexion démo, sauvegarde locale seulement' },
};
const t = (k) => (T[k] ? (T[k][LANG] !== undefined ? T[k][LANG] : T[k].en) : k);

/* ---------------- invitations ----------------
   Fredericton is invitation-only — like any good dinner party.
   v0.2 validates codes client-side (a ritual, not a lock; v1 moves
   this server-side). Codes: WORD-WORD-NN over a local word list. */
const INVITE_WORDS = ['VIOLET','WOLASTOQ','FOUGERE','ACADIE','STELLA','POUTINE','RIVIERE','PONT','CAFE','VELO','HARVEST','FROSTIVAL','TINTAMARRE','MARIGOLD','CHICKADEE','MOITIE','BRUME','HOMARD','SIROP','CANOT','LILAS','PICNIC','AURORE','SENTIER'];
function inviteChecksum(w1, w2) {
  const s = (w1 + '-' + w2).toUpperCase();
  let v = 0;
  for (let i = 0; i < s.length; i++) v = (v * 31 + s.charCodeAt(i)) % 1000000;
  return 10 + (v % 89);
}
function validateInvite(raw) {
  const parts = String(raw || '').trim().toUpperCase().replace(/\s+/g, '-').split('-').filter(Boolean);
  if (parts.length !== 3) return false;
  const [w1, w2, nn] = parts;
  if (!INVITE_WORDS.includes(w1) || !INVITE_WORDS.includes(w2) || w1 === w2) return false;
  return parseInt(nn, 10) === inviteChecksum(w1, w2);
}
function makeInvite() {
  const i = Math.floor(Math.random() * INVITE_WORDS.length);
  let j = Math.floor(Math.random() * INVITE_WORDS.length);
  if (j === i) j = (j + 1) % INVITE_WORDS.length;
  const w1 = INVITE_WORDS[i], w2 = INVITE_WORDS[j];
  return w1 + '-' + w2 + '-' + inviteChecksum(w1, w2);
}

/* ---------------- save ---------------- */
const SAVE_KEY = 'bq_save_v1';
let save = null;
function loadSave() {
  try { save = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { save = null; }
  if (save && save.level === undefined) { save.level = 0; save.recognizedBy = []; }  /* migrate v0 saves */
  if (save && save.myCodes === undefined) { save.myCodes = []; save.codeUsed = null; save.invitedBy = null; }  /* migrate v0.1 saves */
  if (save && save.pages === undefined) { save.pages = []; save.trucs = []; save.pins = []; save.metSpecials = {}; save.minigamesWon = {}; save.plotStage = null; }  /* migrate v0.2 saves */
}
function writeSave() { if (save) localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
loadSave();

/* ---------------- audio (tiny chip bleeps, off by default) ---------------- */
const SND = {
  on: false, ctx: null,
  ensure() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  blip(freq, dur, type, vol) {
    if (!this.on) return;
    try {
      this.ensure();
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.04, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + (dur || 0.07));
      o.connect(g); g.connect(this.ctx.destination);
      o.start(); o.stop(this.ctx.currentTime + (dur || 0.07));
    } catch (e) {}
  },
  text() { this.blip(720 + Math.floor(Math.random() * 60), 0.03, 'square', 0.02); },
  confirm() { this.blip(660, 0.06); this.blip(880, 0.09); },
  stamp() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.blip(f, 0.12, 'triangle', 0.06), i * 90)); },
  step() { this.blip(180, 0.02, 'triangle', 0.012); }
};

/* ---------------- reduced motion ---------------- */
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* =====================================================================
   MAP — real Fredericton geometry, stylized.
   Grid 92 x 56, 16px tiles. North at top. The Saint John River
   (Wolastoq) crosses the middle; Westmorland St Bridge (west, vehicles)
   and the green Bill Thorpe Walking Bridge (east) connect the sides.
   ===================================================================== */
const TILE = 16, MAP_W = 92, MAP_H = 56;

/* tile ids */
const TL = {
  GRASS: 0, GRASS2: 1, TREE: 2, WATER: 3, ROAD: 4, ROADLINE: 5, SIDE: 6,
  XWALK: 7, BANK: 8, BRIDGE: 9, TRUSS: 10, PATH: 11, FLOWER: 12, BENCH: 13,
  WALL: 14, ROOF: 15, DOOR: 16, WINDOW: 17, SIGN: 18, STALL: 19, GAZEBO: 20,
  FLOOR: 21, COUNTER: 22, TABLE: 23, BOARD: 24, RUG: 25, SHELF: 26, PLANT: 27,
};
const SOLID = new Set([TL.TREE, TL.WATER, TL.WALL, TL.ROOF, TL.WINDOW, TL.SIGN, TL.STALL,
  TL.COUNTER, TL.TABLE, TL.BOARD, TL.SHELF, TL.BENCH, TL.GAZEBO, TL.PLANT]);

let map = [];
function fillMap() {
  map = [];
  for (let y = 0; y < MAP_H; y++) {
    const row = [];
    for (let x = 0; x < MAP_W; x++) row.push(((x * 7 + y * 13) % 11 === 0) ? TL.GRASS2 : TL.GRASS);
    map.push(row);
  }
}
const put = (x, y, t) => { if (x >= 0 && y >= 0 && x < MAP_W && y < MAP_H) map[y][x] = t; };
const rectT = (x, y, w, h, t) => { for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) put(x + i, y + j, t); };
const hRoad = (y, x0, x1) => { for (let x = x0; x <= x1; x++) { put(x, y - 1, TL.SIDE); put(x, y, TL.ROAD); put(x, y + 1, x % 6 === 3 ? TL.ROADLINE : TL.ROAD); put(x, y + 2, TL.SIDE); } };
const vRoad = (x, y0, y1) => { for (let y = y0; y <= y1; y++) { put(x - 1, y, TL.SIDE); put(x, y, TL.ROAD); put(x + 1, y, TL.ROAD); put(x + 2, y, TL.SIDE); } };

/* Venue table: real venues, positions derived from TomTom coords
   (west→east by longitude; street placement true to address). */
/* Row plan (north→south):
   0-1 woods · 2-4 northside buildings (door row 4) · 5-8 Main St
   9-13 grass · 14 bank · 15-21 river · 22 bank · 23-24 the Green
   25 green trees/benches · 26-28 Queen-north buildings (door 28)
   29-32 Queen St · 33-35 mid-block buildings (door 35) · 36 alley
   37-40 King St · 41-43 King-south buildings (door 43) · 44 alley
   45-48 Brunswick St · 49-52 Boyce market (door 52) · 53-55 south grass
   Cross streets x=10 Smythe, 22 Westmorland, 36 York, 48 Carleton,
   64 Regent, 80 Church (occupy x-1..x+2). */
const VENUES = [
  /* northside — Main Street (Nashwaaksis), west→east true to addresses */
  { id: 'fancybites', name: 'Fancy Bites By Nancy', type: 'restaurant', x: 26, y: 2, w: 6, h: 3, ico: '🍽️' },
  { id: 'shuyi', name: 'Shuyi Tealicious', type: 'teacafe', x: 36, y: 2, w: 5, h: 3, ico: '🧋' },
  { id: 'timsmain', name: 'Tim Hortons', type: 'coffeeshop', x: 46, y: 2, w: 6, h: 3, ico: '☕' },
  /* Queen-north (river side), rows 26-28 */
  { id: 'wilsers', name: "Wilser's Room", type: 'musicbar', x: 41, y: 26, w: 5, h: 3, ico: '🎸' },
  { id: 'brokenrecord', name: 'Broken Record Bar', type: 'musicbar', x: 52, y: 26, w: 5, h: 3, ico: '🎵' },
  { id: 'gahan', name: 'Gahan House Riverside', type: 'pub', x: 57, y: 26, w: 6, h: 3, ico: '🍻' },
  /* mid-block between Queen & King, rows 33-35, west→east by longitude */
  { id: 'graystone', name: 'Graystone Brewing', type: 'taproom', x: 30, y: 33, w: 5, h: 3, ico: '🍺' },
  { id: 'jonnie', name: 'Jonnie Java Roasters', type: 'cafe', x: 39, y: 33, w: 5, h: 3, ico: '☕' },
  { id: 'library', name: 'Fredericton Public Library', type: 'library', x: 51, y: 33, w: 5, h: 3, ico: '📚' },
  { id: 'chesspiece', name: 'Chess Piece Pâtisserie', type: 'cafe', x: 57, y: 33, w: 5, h: 3, ico: '🥐' },
  { id: 'dolans', name: "Dolan's Pub", type: 'pub', x: 67, y: 33, w: 5, h: 3, ico: '🎻' },
  { id: 'flippins', name: 'Flippins Bar/Arcade', type: 'arcadebar', x: 73, y: 33, w: 5, h: 3, ico: '🕹️' },
  { id: 'playhouse', name: 'Fredericton Playhouse', type: 'theatre', x: 83, y: 33, w: 7, h: 3, ico: '🎭' },
  /* King-south, rows 41-43 */
  { id: 'cafeloka', name: 'Cafe Loka & Bistro', type: 'cafe', x: 30, y: 41, w: 5, h: 3, ico: '🥞' },
  { id: 'tipsymuse', name: 'The Tipsy Muse Cafe', type: 'cafe', x: 57, y: 41, w: 5, h: 3, ico: '🎨' },
  { id: 'happybaker', name: 'The Happy Baker', type: 'bakery', x: 67, y: 41, w: 5, h: 3, ico: '🥖' },
  /* south of Brunswick — George Street */
  { id: 'boyce', name: 'Boyce Farmers Market', type: 'market', x: 56, y: 49, w: 10, h: 4, ico: '🥬' },
];
/* Officers' Square is an open park between the Green and Queen St */
const PARK = { id: 'officers', name: "Officers' Square", x: 68, y: 25, w: 11, h: 4, ico: '⛲' };

function buildWorld() {
  fillMap();
  /* --- northside --- */
  rectT(0, 0, MAP_W, 2, TL.TREE);                    /* back woods */

const ROOM_W = 15, ROOM_H = 10;
function buildInterior(venue) {
  const g = [];
  for (let y = 0; y < ROOM_H; y++) { const r = []; for (let x = 0; x < ROOM_W; x++) r.push(TL.FLOOR); g.push(r); }
  for (let x = 0; x < ROOM_W; x++) { g[0][x] = TL.WALL; g[1][x] = (x % 3 === 1) ? TL.WINDOW : TL.WALL; }
  for (let y = 0; y < ROOM_H; y++) { g[y][0] = TL.WALL; g[y][ROOM_W - 1] = TL.WALL; }
  for (let x = 0; x < ROOM_W; x++) g[ROOM_H - 1][x] = TL.WALL;
  g[ROOM_H - 1][7] = TL.DOOR;                                   /* exit at bottom */
  for (let x = 4; x <= 10; x++) g[3][x] = TL.COUNTER;           /* counter */
  g[5][3] = TL.TABLE; g[5][11] = TL.TABLE; g[7][5] = TL.TABLE; g[7][9] = TL.TABLE;
  g[2][12] = TL.PLANT; g[2][2] = (venue.type === 'library') ? TL.SHELF : TL.PLANT;
  if (venue.type === 'library') { g[5][3] = TL.SHELF; g[5][11] = TL.SHELF; }
  if (venue.type === 'market') { g[5][3] = TL.STALL; g[5][11] = TL.STALL; g[7][5] = TL.STALL; g[7][9] = TL.STALL; }
  g[2][13] = TL.BOARD;                                          /* rendez-vous board — wait, row1 is wall; use row2 col13 */
  return g;
}

 Three words, always clean."},{"fr":"Mets n'importe quel adjectif après « c'est », pis t'as une toune complète.","en":"Drop any adjective after 'c'est' and you've got a whole track."},{"fr":"Reviens me voir sur le Green, pratique ta ligne de basse française.","en":"Come see me on the Green, and practice your French bassline."}],"truc":{"titleFR":"Le moteur à « c'est »","titleEN":"The C'est Engine","ruleFR":"« C'est » + adjectif = phrase correcte, complète, cool.","ruleEN":"'C'est' + adjective = correct, complete, cool sentence.","exampleFR":"Le pont piétonnier au coucher du soleil? C'est magique.","exampleEN":"The walking bridge at sunset? That's magic."}},{"grantsPage":false,"id":"jardiniere-violette","name":"Violette, Fleuriste du Square","pages":[{"fr":"Ah, un promeneur! Tiens la terre, respire — la violette pousse mieux avec de la compagnie.","en":"Ah, a wanderer! Hold the soil, breathe — violets grow better with company."},{"fr":"« La violette », féminin. « Le jardinage », masculin. Coïncidence? Non — c'est dans la graine!","en":"'La violette,' feminine. 'Le jardinage,' masculine. Coincidence? No — it's in the seed!"},{"fr":"-tion, -ette, -ure : presque toujours féminins. Regarde la fin du mot, pas son cœur.","en":"-tion, -ette, -ure: almost always feminine. Look at the word's ending, not its heart."},{"fr":"-age, -eau, -ment : masculins la plupart du temps. Le jardinage, le chapeau, le moment.","en":"-age, -eau, -ment: mostly masculine. Le jardinage, le chapeau, le moment."},{"fr":"N'apprends pas chaque fleur par cœur, mon ami. Apprends à lire les graines, et le jardin s'ouvre.","en":"Don't memorize every flower, my friend. Learn to read the seeds, and the garden opens up."}],"truc":{"titleFR":"Le moteur des finales","titleEN":"The Ending Engine","ruleFR":"Regarde la fin du mot : -tion/-ette féminin, -age/-eau masculin.","ruleEN":"Check the word's ending: -tion/-ette feminine, -age/-eau masculine.","exampleFR":"La violette (féminin) pousse près du jardinage (masculin) du Square.","exampleEN":"La violette (feminine) grows beside le jardinage (masculine) of the Square."}},{"id":"pecheur-du-pont","name":"Ti-Louis le Pêcheur","pages":[{"fr":"Pas une touche depuis six ans. La meilleure pêche de ma vie.","en":"Not a bite in six years. Best fishing of my life."},{"fr":"Toi, t'as peur du silence. Le poisson, lui, il adore ça.","en":"You're scared of silence. The fish, though? Loves it."},{"fr":"Dis « euh… », arrête-toi, regarde l'eau. C'est déjà du français, ça.","en":"Say \"euh…\", stop, look at the water. That's French too."},{"fr":"Une phrase pas finie, c'est une ligne à l'eau. Attends un peu.","en":"An unfinished sentence is a line in the water. Just wait."},{"fr":"Un jour j'attraperai quelque chose. En attendant, j'attrape le temps.","en":"One day I'll catch something. Meanwhile, I catch the time."}],"truc":{"titleFR":"Le moteur à « euh »","titleEN":"The \"euh\" Engine","ruleFR":"Un « euh… » et une pause, c'est encore parler français.","ruleEN":"An \"euh…\" and a pause still count as speaking French.","exampleFR":"« Je voudrais... euh... » Ti-Louis hoche la tête : « Continue, j'ai tout mon temps. »","exampleEN":"\"I'd like... euh...\" Ti-Louis nods: \"Go on, I've got all day.\""},"grantsPage":true},{"id":"facteur-presse","name":"Gaston Vite-Fait","pages":[{"fr":"Facteur Gaston, en retard, TOUJOURS en retard ! Le courrier attend pas, mon ami !","en":"Postman Gaston, late, ALWAYS late! The mail doesn't wait, my friend!"},{"fr":"J'ai couru la rue Queen dix fois aujourd'hui. Mes bottines fument, regarde !","en":"I've run down Queen Street ten times today. My boots are smoking, look!"},{"fr":"Dis-moi : « Pouvez-vous parler plus lentement ? » Vas-y, essaie, ça coûte rien !","en":"Tell me: \"Could you speak more slowly?\" Go on, try it, it costs nothing!"},{"fr":"Ah, tu vois ? Ça fait chaud au cœur, ça. Un vrai cadeau, cette phrase.","en":"Ah, see? That warms the heart. That sentence is a real gift."},{"fr":"Moi, ralentir ? Impossible, le pont piétonnier m'appelle ! Bonne journée, cours vite !","en":"Me, slow down? Impossible, the walking bridge is calling! Have a good day, run fast!"}],"truc":{"titleFR":"Le cadeau de la lenteur","titleEN":"The Gift of Slowness","ruleFR":"Demander à ralentir, c'est offrir ton attention à l'autre.","ruleEN":"Asking someone to slow down is offering them your attention.","exampleFR":"« Plus lentement, s'il vous plaît ? » et Gaston sourit, même pressé.","exampleEN":"\"Slower, please?\" and Gaston smiles, even while rushing."},"grantsPage":false}];

function animalWalkable(a, x, y) {
  if (x < a.minX || x > a.maxX || y < a.minY || y > a.maxY) return false;
  const id = map[y] && map[y][x];
  if (a.kind === 'duck') return id === TL.WATER;
  return id === TL.GRASS || id === TL.GRASS2 || id === TL.PATH || id === TL.FLOWER;
}
function updateAnimals() {
  if (state !== 'world' || dialogueActive || finaleCrowd) return;
  animals.forEach(a => {
    a.cd = Math.max(0, a.cd - 1);
    const dist = Math.abs(a.x - player.x) + Math.abs(a.y - player.y);
    if (a.kind === 'deer' && a.state !== 'friend') {
      if (dist <= 5 && stillFrames < 90 && a.cd === 0) {
        /* flee: step directly away from sudden movement */
        const dx = Math.sign(a.x - player.x) || (Math.random() < 0.5 ? 1 : -1);
        const dy = Math.sign(a.y - player.y);
        if (animalWalkable(a, a.x + dx, a.y)) a.x += dx;
        else if (animalWalkable(a, a.x, a.y + dy)) a.y += dy;
        a.state = 'wary'; a.cd = 18;
      } else if (dist > 1 && dist <= 5 && stillFrames > 240 && a.cd === 0) {
        /* patience: it comes to you */
        a.state = 'approaching';
        const dx = Math.sign(player.x - a.x), dy = Math.sign(player.y - a.y);
        if (dx && animalWalkable(a, a.x + dx, a.y)) a.x += dx;
        else if (dy && animalWalkable(a, a.x, a.y + dy)) a.y += dy;
        a.cd = 55;
      }
    }
    if (a.kind === 'squirrel' && dist <= 2 && a.cd === 0) {
      const dx = Math.sign(a.x - player.x) || 1;

function grantPage(idx, sourceLabel) {

/* =====================================================================
   MOVEMENT + COLLISION
   ===================================================================== */
const keys = {};
function solidAt(tx, ty) {
  const grid = state === 'interior' ? interior.grid : map;
  const id = tileAt(grid, tx, ty);
  if (SOLID.has(id)) return true;
  if (state === 'world') {
    if (folk.some(f => f.x === tx && f.y === ty)) return true;
    if (specials.some(s => s.x === tx && s.y === ty)) return true;
    if (animals.some(a => (a.kind === 'cat' || a.kind === 'deer') && a.x === tx && a.y === ty)) return true;
  }
  return false;
}
function tryMove(dx, dy) {
  if (player.moving || dialogueActive || state === 'title') return;
  player.dir = dx < 0 ? 'left' : dx > 0 ? 'right' : dy < 0 ? 'up' : 'down';
  const nx = player.x + dx, ny = player.y + dy;
  const grid = state === 'interior' ? interior.grid : map;
  const gw = state === 'interior' ? ROOM_W : MAP_W, gh = state === 'interior' ? ROOM_H : MAP_H;
  if (nx < 0 || ny < 0 || nx >= gw || ny >= gh) return;
  const id = tileAt(grid, nx, ny);
  /* the bridge gate: crossings open once an Hôte has named you Level 2+ */
  if (state === 'world' && id === TL.BRIDGE && (save.level || 0) < 1) {
    SND.confirm();
    startDialogue([
      { speaker: LANG === 'fr' ? 'La Brigade du pont' : 'The Bridge Brigade',
        fr: 'Oh là ! Le pont est réservé aux nommés.',
        en: 'Whoa there! The bridge is for the named.' },
      { speaker: LANG === 'fr' ? 'La Brigade du pont' : 'The Bridge Brigade',
        fr: 'Reviens quand un Hôte ★ t’aura nommé·e « Commandeur·e de café ». Les conversations remplissent ton assurance !',
        en: 'Come back once a gold-star Hôte has named you “Coffee Commander”. Conversations fill your confidence!' },
    ]);
    return;
  }
  /* doors */
  if (state === 'world' && id === TL.DOOR) { const v = VENUES.find(v => v.doorX === nx && v.doorY === ny); if (v) { enterVenue(v); return; } }
  if (state === 'interior' && id === TL.DOOR) { exitVenue(); return; }
  if (solidAt(nx, ny)) return;
  player.x = nx; player.y = ny; player.moving = true; player.mx = dx; player.my = dy;
  stillFrames = 0;   /* the deer noticed */
  SND.step();
}
function stepPlayer() {
  if (!player.moving) return;
  const speed = 2;
  player.px += player.mx * speed; player.py += player.my * speed;
  if (Math.abs(player.px - player.x * TILE) < speed && Math.abs(player.py - player.y * TILE) < speed) {
    player.px = player.x * TILE; player.py = player.y * TILE; player.moving = false;
    if (state === 'world') checkBanner();
  }
}
function checkBanner() {
  let msg = null;
  if (player.y <= 13) msg = 'Nashwaaksis — Main Street';
  else if (player.y >= 14 && player.y <= 22) msg = LANG === 'fr' ? 'La rivière Wolastoq / Saint-Jean' : 'The Wolastoq / Saint John River';
  else if (player.y >= 23 && player.y <= 25) msg = LANG === 'fr' ? 'La promenade The Green' : 'The Green';
  else if (player.y >= 29 && player.y <= 32) msg = 'Queen Street';
  else if (player.y >= 37 && player.y <= 40) msg = 'King Street';
  else if (player.y >= 45 && player.y <= 48) msg = 'Brunswick Street';
  if (PARK.x <= player.x && player.x < PARK.x + PARK.w && PARK.y <= player.y && player.y < PARK.y + PARK.h) msg = "Officers' Square";
  showBanner(msg);
}
let lastBanner = '';
function showBanner(msg) {
  const el = document.getElementById('loc-banner');
  if (!msg || msg === lastBanner) { if (!msg) { el.style.opacity = 0; lastBanner = ''; } return; }
  lastBanner = msg; el.textContent = msg; el.style.opacity = 1;
  clearTimeout(bannerTimer); bannerTimer = setTimeout(() => { el.style.opacity = 0; }, 2200);
}

/* =====================================================================
   INTERACTION
   ===================================================================== */
function facing() {
  const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[player.dir];
  return [player.x + d[0], player.y + d[1]];
}
function interactTarget() {
  if (state === 'title') return null;
  const [fx, fy] = facing();
  if (state === 'world') {
    const sp = specials.find(s => s.x === fx && s.y === fy);
    if (sp) return { kind: 'special', special: sp, hint: sp.host ? (LANG === 'fr' ? 'jouer' : 'play') : t('talk') };
    const cat = animals.find(a => a.kind === 'cat' && a.x === fx && a.y === fy);
    if (cat) return { kind: 'cat', cat, hint: LANG === 'fr' ? 'flatter' : 'pet' };
    const deer = animals.find(a => a.kind === 'deer' && Math.abs(a.x - player.x) + Math.abs(a.y - player.y) === 1 && (a.state === 'approaching' || a.state === 'friend'));
    if (deer) return { kind: 'deer', deer, hint: LANG === 'fr' ? 'approcher' : 'approach' };
    const f = folk.find(f => f.x === fx && f.y === fy);
    if (f) return { kind: 'folk', folk: f, hint: t('talk') };
    const grid = map;
    if (tileAt(grid, fx, fy) === TL.DOOR) { const v = VENUES.find(v => v.doorX === fx && v.doorY === fy); if (v) return { kind: 'door', venue: v, hint: t('enter') }; }
    if (PARK.x <= fx && fx < PARK.x + PARK.w && PARK.y <= fy && fy < PARK.y + PARK.h && tileAt(grid, fx, fy) === TL.GAZEBO) {
      return { kind: 'park', hint: finaleEligible() ? '✶✶✶' : 'Tintamarre !' };
    }
  } else if (state === 'interior') {
    if (tileAt(interior.grid, fx, fy) === TL.COUNTER) return { kind: 'keeper', hint: t('talk') };
    if (tileAt(interior.grid, fx, fy) === TL.BOARD) return { kind: 'board', hint: t('read') };
    if (tileAt(interior.grid, fx, fy) === TL.DOOR) return { kind: 'exit', hint: t('exit') };
  }
  return null;
}
function interact() {
  if (dialogueActive) { advanceDialogue(); return; }
  const target = interactTarget();
  if (!target) return;
  SND.confirm();
  if (target.kind === 'folk') {
    const f = target.folk;
    const pages = [{ speaker: f.name, fr: f.lineFR, en: f.lineEN }];
    if (f.tipFR || f.tipEN) pages.push({ speaker: f.name, fr: f.tipFR || f.tipEN, en: f.tipEN || '' });
    startDialogue(pages);
  } else if (target.kind === 'special') {
    talkToSpecial(target.special);
  } else if (target.kind === 'cat') {
    talkToCat(target.cat);
  } else if (target.kind === 'deer') {
    approachDeer(target.deer);
  } else if (target.kind === 'door') {
    enterVenue(target.venue);
  } else if (target.kind === 'park') {
    if (finaleEligible()) runFinale(); else openMinigame('tintamarre');
  } else if (target.kind === 'keeper') {
    if (interior.pack.npc.isHote && readyToLevel()) recognitionCeremony();
    else startEncounter();
  } else if (target.kind === 'board') {
    openEvents(interior.venue);
  } else if (target.kind === 'exit') {
    exitVenue();
  }
}

/* =====================================================================
   VENUES: enter/exit
   ===================================================================== */
let worldPos = null;
function enterVenue(v) {
  worldPos = { x: v.doorX, y: v.doorY + 1 };
  const pack = packFor(v);
  interior = { venue: v, grid: buildInterior(v), pack, keeperStyle: HERO_STYLES[(v.id.length + 2) % HERO_STYLES.length] };
  state = 'interior';
  player.x = 7; player.y = ROOM_H - 2; player.px = player.x * TILE; player.py = player.y * TILE; player.dir = 'up'; player.moving = false;
  showBanner(v.ico + ' ' + v.name);
  const g = pack.npc;
  startDialogue([{ speaker: g.name + (g.isHote ? ' ★' : ''), fr: g.greetingFR, en: g.greetingEN }]);
}
function exitVenue() {
  state = 'world';
  if (worldPos) { player.x = worldPos.x; player.y = worldPos.y; }
  player.px = player.x * TILE; player.py = player.y * TILE; player.dir = 'down'; player.moving = false;
  interior = null;
}

const dlgSpeaker = document.getElementById('dlg-speaker');
const dlgNext = document.getElementById('dlg-next');
const choicesEl = document.getElementById('choices');
let dlgQueue = [], dlgTyping = false, dlgTimer = null, dlgOnDone = null;

function startDialogue(pages, onDone) {
  dlgQueue = pages.slice(); dlgOnDone = onDone || null;
  dialogueActive = true;
  dlgEl.classList.remove('hidden');
  showPage();
}
function showPage() {
  const page = dlgQueue[0];
  if (!page) { endDialogue(); return; }
  dlgSpeaker.innerHTML = page.speaker.replace('★', '<span class="star">★</span>');
  choicesEl.innerHTML = '';
  dlgNext.style.visibility = 'hidden';
  const frSpan = '<span class="fr"></span>' + (page.en ? '<span class="en"></span>' : '');
  dlgText.innerHTML = frSpan;
  const frEl = dlgText.querySelector('.fr'), enEl = dlgText.querySelector('.en');
  const full = page.fr || '';
  if (REDUCED) {
    frEl.textContent = full; if (enEl) enEl.textContent = page.en;
    dlgTyping = false; dlgNext.style.visibility = 'visible'; renderChoices(page);
    return;
  }
  let i = 0; dlgTyping = true;
  clearInterval(dlgTimer);
  dlgTimer = setInterval(() => {
    i++;
    frEl.textContent = full.slice(0, i);
    if (i % 2 === 0) SND.text();
    if (i >= full.length) {
      clearInterval(dlgTimer); dlgTyping = false;
      if (enEl) enEl.textContent = page.en;
      if (!page.choices) dlgNext.style.visibility = 'visible';
      renderChoices(page);
    }
  }, 22);
}
function renderChoices(page) {
  if (!page.choices) return;
  choicesEl.innerHTML = '';
  page.choices.forEach((ch, i) => {
    const b = document.createElement('button');
    b.className = 'choice'; b.type = 'button';
    b.innerHTML = '<span class="cursor">▶</span>' + ch.fr + '<span class="en">' + ch.en + '</span>';
    b.addEventListener('click', () => { SND.confirm(); page.onChoice(ch, i); });
    choicesEl.appendChild(b);
  });
  if (choicesEl.firstChild) choicesEl.firstChild.focus();
}
function advanceDialogue() {
  const page = dlgQueue[0];
  if (!page) { endDialogue(); return; }
  if (dlgTyping) {  /* fast-forward */
    clearInterval(dlgTimer); dlgTyping = false;
    const frEl = dlgText.querySelector('.fr'), enEl = dlgText.querySelector('.en');
    frEl.textContent = page.fr; if (enEl) enEl.textContent = page.en;
    if (!page.choices) dlgNext.style.visibility = 'visible';
    renderChoices(page);
    return;
  }
  if (page.choices) return;  /* must click a choice */
  dlgQueue.shift();
  if (dlgQueue.length) showPage(); else endDialogue();
}
function endDialogue() {
  dialogueActive = false;
  dlgEl.classList.add('hidden');
  clearInterval(dlgTimer);
  const cb = dlgOnDone; dlgOnDone = null;
  if (cb) cb();
}

/* =====================================================================
   ENCOUNTER — the 3-turn phrase-choice conversation
   ===================================================================== */
function startEncounter() {
  const pack = interior.pack;
  const already = save.stamps[pack.venueId];
  let warmthTotal = 0, turnIdx = 0;
  const speaker = pack.npc.name + (pack.npc.isHote ? ' ★' : '');
  function nextTurn() {
    if (turnIdx >= pack.encounter.turns.length) { finishEncounter(pack, warmthTotal, already); return; }
    const turn = pack.encounter.turns[turnIdx];
    startDialogue([{
      speaker, fr: turn.npcFR, en: turn.npcEN,
      choices: turn.choices.map(ch => ({ ...ch })),
      onChoice: (ch) => {
        warmthTotal += ch.warmth || 1;
        turnIdx++;
        dlgQueue = [];
        startDialogue([{ speaker, fr: ch.reactionFR, en: ch.reactionEN }], nextTurn);
      }
    }]);
  }
  nextTurn();
}
function finishEncounter(pack, warmth, already) {
  const gained = already ? Math.max(1, Math.floor(warmth / 3)) : warmth + 3;
  save.confidence += gained;
  let announce;
  if (!already) {
    save.stamps[pack.venueId] = true;
    if (pack.npc.isHote && !save.hotesMet.includes(pack.npc.name)) save.hotesMet.push(pack.npc.name);
    announce = { speaker: 'BILINGUA', fr: '✶ ' + t('stampGot') + ' — ' + interior.venue.name + '  ·  ' + t('confUp') + gained, en: pack.quest.titleEN + ' ✓' };
    SND.stamp();
  } else {
    announce = { speaker: 'BILINGUA', fr: t('confUp') + gained + ' ☕', en: '' };
  }
  writeSave(); updateHud();
  const pages = [announce];
  if (readyToLevel()) pages.push({
    speaker: 'BILINGUA',
    fr: '⭐ Ton assurance déborde ! Va voir un Hôte (étoile dorée ★) — il ou elle pourrait te nommer…',
    en: '⭐ Your confidence is overflowing! Visit an Hôte (gold star ★) — they might just name you…'
  });
  startDialogue(pages);
}

/* Levels are MENTOR-GRANTED: confidence makes you *ready*, but only an
   Hôte (gold star) can name you to the next level — a small ceremony.
   That's the whole thesis: real confidence is conferred by people. */
const LEVELS = [
  { min: 0, en: 'Brave Beginner', fr: 'Débutant·e courageux·se' },
  { min: 10, en: 'Coffee Commander', fr: 'Commandeur·e de café' },
  { min: 22, en: 'Small Talker', fr: 'Causeur·se' },
  { min: 38, en: 'Regular', fr: 'Habitué·e' },
  { min: 60, en: 'Conversationalist', fr: 'Grand·e bavard·e' },
  { min: 90, en: 'Bilingua Legend', fr: 'Légende Bilingua' },
];
function confTitle() {
  const lv = LEVELS[Math.min(save.level || 0, LEVELS.length - 1)];
  return LANG === 'fr' ? lv.fr : lv.en;
}
function readyToLevel() {
  const next = LEVELS[(save.level || 0) + 1];
  return !!next && save.confidence >= next.min;
}
/* what each Hôte's authority is sworn on — per-venue ceremony flavour */
const CEREMONY_POWER = {
  jonnie: { fr: 'du café fraîchement torréfié', en: 'freshly roasted coffee' },
  chesspiece: { fr: 'de la pâtisserie', en: 'pastry' },
  dolans: { fr: 'du violon du jeudi soir', en: 'the Thursday-night fiddle' },
  boyce: { fr: 'des têtes de violon du samedi', en: 'Saturday fiddleheads' },
  library: { fr: 'de tous les livres de la ville', en: 'every book in town' },
  fancybites: { fr: 'de la bonne cuisine', en: 'good cooking' },
};
function recognitionCeremony() {
  const pack = interior.pack;
  const speaker = pack.npc.name + ' ★';
  const nextLevel = LEVELS[save.level + 1];
  const power = CEREMONY_POWER[pack.venueId] || { fr: 'du café', en: 'coffee' };
  const title = LANG === 'fr' ? nextLevel.fr : nextLevel.en;
  startDialogue([
    { speaker, fr: 'Attends… je te regarde aller depuis un moment. Tu es prêt·e.',
      en: 'Wait… I’ve been watching you for a while. You’re ready.' },
    { speaker, fr: 'Par le pouvoir ' + power.fr + ' qui m’est conféré… je te nomme « ' + nextLevel.fr + ' » !',
      en: 'By the power of ' + power.en + ' vested in me… I name you “' + nextLevel.en + '”!' },
    { speaker: 'BILINGUA', fr: '✶ NIVEAU : ' + title + ' ✶', en: (LANG === 'fr' ? nextLevel.en : nextLevel.fr) },
    { speaker: 'BILINGUA',
      fr: 'Ton avis compte ! Dis à Kurt ce que tu en penses — le lien est sur la page d’accueil.',
      en: 'Your opinion counts! Tell Kurt what you think — the link is on the home page.' },
  ], () => {});
  save.level += 1;
  save.recognizedBy.push({ level: save.level, by: pack.npc.name, venue: interior.venue.name });
  /* first naming confers the power to invite: 3 invitations of your own */
  if (!save.myCodes || save.myCodes.length === 0) {
    save.myCodes = [makeInvite(), makeInvite(), makeInvite()];
    dlgQueue.splice(3, 0, {
      speaker: pack.npc.name + ' ★',
      fr: 'Et avec le titre viennent trois invitations. Fredericton s’agrandit une personne à la fois — choisis bien.',
      en: 'And with the title come three invitations. Fredericton grows one person at a time — choose well.'
    }, {
      speaker: 'BILINGUA',
      fr: '✶ 3 INVITATIONS reçues — dans ton Passeport [P]',
      en: '✶ 3 INVITATIONS received — in your Passeport [P]'
    });
  }
  writeSave(); updateHud();
  SND.stamp();
}

   ===================================================================== */
function updateHud() {
  const ready = readyToLevel();
  document.getElementById('hud-conf').textContent =
    (ready ? '⭐ ' : '☕ ') + save.confidence + ' · ' + confTitle() +
    (ready ? (LANG === 'fr' ? ' — vois un Hôte ★ !' : ' — see an Hôte ★!') : '');
}
function beginWorld() {
  state = 'world';
  document.getElementById('vision-link').style.display = 'none';
  player.styleIdx = save.styleIdx || 0;
  player.x = 59; player.y = 23; player.px = player.x * TILE; player.py = player.y * TILE;
  placeFolk();
  placeLivingTown();
  document.getElementById('hud').classList.remove('hidden');
  updateHud();
  showBanner(LANG === 'fr' ? 'Bienvenue à Fredericton, ' + save.name + ' !' : 'Welcome to Fredericton, ' + save.name + '!');
}
function titleAction() {
  if (state !== 'title') return;
  SND.confirm();
  if (save && save.name) {
    /* continue vs new */
    modal('<h2>' + t('title') + '</h2><div class="btnrow">' +
      '<button class="btn" id="m-cont">' + t('continueG') + ' — ' + save.name + '</button>' +
      '<button class="btn alt" id="m-new">' + t('newGame') + '</button></div>');
    document.getElementById('m-cont').addEventListener('click', () => { closeModal(); beginWorld(); });
    document.getElementById('m-new').addEventListener('click', () => { closeModal(); showInvitation(); });
  } else showInvitation();
}
document.addEventListener('keydown', (e) => {
  if (e.repeat && ['Enter', ' ', 'z', 'Z'].includes(e.key)) return;
  keys[e.key] = true;
  if (state === 'title' && (e.key === 'Enter' || e.key === ' ')) { titleAction(); return; }
  if ((e.key === 'z' || e.key === 'Z' || e.key === 'Enter' || e.key === ' ') && state !== 'title') {
    if (!modalRoot.children.length) { e.preventDefault(); interact(); }
  }
  if ((e.key === 'p' || e.key === 'P') && state !== 'title' && save) {
    if (modalRoot.children.length) closeModal(); else showPassport();
  }
  if (e.key === 'Escape') closeModal();
  if (e.key === 'm' || e.key === 'M') toggleSound();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });
function pollKeys() {
  if (modalRoot.children.length || dialogueActive) return;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) tryMove(0, -1);
  else if (keys['ArrowDown'] || keys['s'] || keys['S']) tryMove(0, 1);
  else if (keys['ArrowLeft'] || keys['a'] || keys['A']) tryMove(-1, 0);
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) tryMove(1, 0);
}
/* touch */
if ('ontouchstart' in window) document.body.classList.add('touch');
document.querySelectorAll('#dpad button').forEach(b => {
  const dir = b.dataset.dir;
  const D = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[dir];
  let iv = null;
  const start = (e) => { e.preventDefault(); tryMove(D[0], D[1]); iv = setInterval(() => tryMove(D[0], D[1]), 160); };
  const stop = () => clearInterval(iv);
  b.addEventListener('touchstart', start); b.addEventListener('touchend', stop); b.addEventListener('touchcancel', stop);
});
document.getElementById('abtn').addEventListener('touchstart', (e) => { e.preventDefault(); if (state === 'title') titleAction(); else interact(); });
cv.addEventListener('click', () => { if (state === 'title') titleAction(); });
document.getElementById('dlg').addEventListener('click', (e) => { if (e.target.closest('.choice')) return; advanceDialogue(); });
/* hud buttons */
document.getElementById('hud-passport').addEventListener('click', showPassport);
document.getElementById('hud-lang').addEventListener('click', () => {
  LANG = LANG === 'en' ? 'fr' : 'en'; localStorage.setItem('bq_lang', LANG); updateHud();
  document.getElementById('hud-passport').textContent = t('passport') + ' [P]';
});
function toggleSound() {
  SND.on = !SND.on; if (SND.on) { SND.ensure(); SND.confirm(); }
  document.getElementById('hud-snd').textContent = '♪ ' + (SND.on ? 'on' : 'off');
}
document.getElementById('hud-snd').addEventListener('click', toggleSound);

/* resize: integer-scale canvas to viewport */
function fit() {
  let scale = Math.min(window.innerWidth / 480, window.innerHeight / 320);
  if (scale >= 1) scale = Math.floor(scale);          /* integer upscale for crispness */
  cv.style.width = (480 * scale) + 'px'; cv.style.height = (320 * scale) + 'px';
}
window.addEventListener('resize', fit); fit();

/* main loop */
buildAtlas();
buildWorld();
function loop() {
  pollKeys();
  stepPlayer();
  if (state === 'world' && !player.moving) stillFrames++;
  if (frameCount % 3 === 0) updateAnimals();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
