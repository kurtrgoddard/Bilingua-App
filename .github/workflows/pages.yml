name: Deploy site to GitHub Pages

# Pages serves from the gh-pages branch (auto-enabled when that branch
# first appeared). This workflow keeps gh-pages in sync with site/ on
# every push to main — no Pages-admin API calls needed.

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add .nojekyll
        run: touch site/.nojekyll
      - name: Publish site/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
